# Informational settings for the autonomous research agent.
#
# NOTE: the live path is the Copilot CLI (run_loop.sh). Copilot reads AGENTS.md
# and the skills, NOT this file. These values are kept as human-readable hints /
# conventions; no production code parses this file. (The old api_backend raw-API
# loop that consumed provider/loop settings has been removed — Copilot is the
# only brain.)

compute:
  # Hints about available host compute. The agent verifies at runtime with
  # `nvidia-smi` and `python -c "import os; print(os.cpu_count())"`.
  gpu: auto
  cpu: auto

memory:
  # Conventions used by memory/ (vector store location + collection name).
  vector_store_path: memory/.chroma
  collection: research

providers:
  # LLM provider keys this project uses, when a tool/script needs to call out
  # (see the external-apis skill). Keys live in .env, never here.
  #   OPENAI_API_KEY  -> OpenAI   (base_url https://api.openai.com/v1)
  #   XAI_API_KEY     -> xAI Grok (base_url https://api.x.ai/v1, OpenAI-SDK compatible)
  allowed: [openai, xai]
